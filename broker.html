<!-- основная страничка для бо -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LUMIT Broker</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #161a1e; --accent: #ffffff; --green: #2ebd85; --red: #f6465d; }
        body { background: var(--bg); color: #eaecef; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--panel); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2b3139; }
        .logo { color: var(--accent); font-weight: bold; font-size: 20px; letter-spacing: 2px; }
        .main { display: flex; flex: 1; overflow: hidden; }
        #chart { flex: 1; position: relative; }
        .sidebar { width: 260px; background: var(--panel); padding: 20px; display: flex; flex-direction: column; gap: 20px; border-left: 1px solid #2b3139; }
        input { background: #2b3139; border: 1px solid #474d57; color: white; padding: 10px; border-radius: 4px; width: 100%; box-sizing: border-box; }
        .btn { padding: 15px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-up { background: var(--green); }
        .btn-down { background: var(--red); }
        #status { text-align: center; color: var(--accent); font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">LUMIT_TRADE</div>
        <div style="font-weight: bold;">Баланс: <span id="balance-amount">1000.00</span> $</div>
    </header>
    <div class="main">
        <div id="chart"></div>
        <div class="sidebar">
            <div>
                <label style="font-size: 11px; color: #848e9c;">СУММА ($)</label>
                <input type="number" id="amount" value="10">
            </div>
            <div>
                <label style="font-size: 11px; color: #848e9c;">ВРЕМЯ (СЕК)</label>
                <input type="number" id="time" value="5">
            </div>
            <div id="status-bar">Рынок открыт</div>            <button class="btn btn-up" onclick="sendTrade('higher')">ВЫШЕ ▲</button>
            <button class="btn btn-down" onclick="sendTrade('lower')">НИЖЕ ▼</button>
        </div>
    </div>

<script>
    window.onload = () => {
        console.log("Запуск графического движка ...");

        const chartElement = document.getElementById('chart');
        
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
    layout: { background: { color: '#0b0e11' }, textColor: '#d1d4dc' },
    grid: { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
    width: document.getElementById('chart').clientWidth,
    height: document.getElementById('chart').clientHeight, 
});

        let lineSeries;
        try {
            lineSeries = chart.addSeries(LightweightCharts.LineSeries, {
                color: '#f0b90b',
                lineWidth: 2,
            });
            console.log("Линия создана методом v5");
        } catch (e) {
            lineSeries = chart.addLineSeries({
                color: '#f0b90b',
                lineWidth: 2,
            });
        }
        const socket = io('http://localhost:3000');
        let balance = 1000.00;

        socket.on('price_update', (data) => {
            lineSeries.update(data);
        });
window.sendTrade = (type) => {
    console.log("Нажата кнопка:", type); // Это появится в консоли при нажатии
    const amount = parseFloat(document.getElementById('amount').value);
    const time = parseInt(document.getElementById('time').value);
    
    if (amount > balance) {
        alert("денег нет");
        return;
    }

    document.getElementById('status-bar').innerText = "Сделка открыта...";
    socket.emit('make_trade', { type, amount, time });
};

        socket.on('trade_result', (data) => {
            balance += data.profit;
            document.getElementById('balance-amount').innerText = balance.toFixed(2);
            document.getElementById('status-bar').innerText = `${data.result}: ${data.profit > 0 ? '+' : ''}${data.profit.toFixed(2)}$`;
        });
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: chartElement.clientWidth });
        });
    };
</script>
</body>
</html>
